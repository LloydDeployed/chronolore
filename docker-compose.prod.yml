services:
  app:
    build: .
    restart: unless-stopped
    ports:
      - "4001:4001"
    environment:
      - DATABASE_URL=postgresql://chronolore:${POSTGRES_PASSWORD}@db:5432/chronolore
      - JWT_SECRET=${JWT_SECRET}
      - NODE_ENV=production
      - PORT=4001
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: chronolore
      POSTGRES_USER: chronolore
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chronolore"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
